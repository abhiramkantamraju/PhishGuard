{% extends "base.html" %}

{% block title %}PhishGuard{% endblock %}

{% block content %}
    <nav>
        <a href="/history">View scan history</a>
    </nav>
    <h1>PhishGuard</h1>
    <p>Paste an email message below to check it for common phishing warning signs.</p>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label for="email_text">Email text</label>
        <textarea id="email_text" name="email_text" placeholder="Paste the email content here...">{{ email_text or "" }}</textarea>
        <button type="submit">Analyze Email</button>
    </form>
{% endblock %}
